name: Spell Check

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'README.md'
      - 'python/**/*.py'
      - 'include/**/*.h'
      - 'src/**/*.c'
      - '.github/workflows/spell-check.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'README.md'
      - 'python/**/*.py'
      - 'include/**/*.h'
      - 'src/**/*.c'
      - '.github/workflows/spell-check.yml'

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install codespell
        run: |
          python -m pip install --upgrade pip
          pip install codespell

      - name: Run codespell
        run: |
          codespell \
            --skip="./build,./.git,./dist,./site,*.svg" \
            --ignore-words=.codespell-ignore \
            --check-hidden \
            .

      - name: Run codespell on docs
        run: |
          codespell \
            --skip="./build,./.git,./dist,./site,*.svg" \
            --ignore-words=.codespell-ignore \
            docs/
