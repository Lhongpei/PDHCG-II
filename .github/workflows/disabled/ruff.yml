name: Ruff Format

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ruff.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ruff.yml'

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check Python formatting
        run: |
          ruff format --check python/

      - name: Check Python linting
        run: |
          ruff check python/
