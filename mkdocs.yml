site_name: PDHCG-II Documentation
site_description: GPU-Accelerated Solver for Quadratic Programming
site_author: Hongpei Li
site_url: https://lhongpei.github.io/PDHCG-II

repo_name: Lhongpei/PDHCG-II
repo_url: https://github.com/Lhongpei/PDHCG-II

nav:
  - Home: index.md
  - Installation: installation.md
  - Python API:
    - Quick Start: python/quickstart.md
    - Model Class: python/model.md
    - Parameters: python/parameters.md
  - C API:
    - Overview: c/overview.md
    - Types: c/types.md
    - Functions: c/functions.md
  - Examples: examples.md
  - Citation: citation.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: true
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_docstring_attributes: true
            show_docstring_functions: true
            show_docstring_classes: true
            show_docstring_modules: true
            heading_level: 2
            filters: ["!^_"]
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_if_no_docstring: false
            docstring_section_style: table

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lhongpei/PDHCG-II
